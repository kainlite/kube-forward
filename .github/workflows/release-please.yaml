name: release-please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: kube-forward

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build and upload binaries only when release-please actually cut a release.
  # Running here (rather than in a separate tag-triggered workflow) avoids the
  # GITHUB_TOKEN limitation where bot-pushed tags do not trigger other workflows.
  build-and-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: kube-forward
            asset_name: kube-forward-linux-amd64
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: kube-forward
            asset_name: kube-forward-linux-arm64
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: kube-forward
            asset_name: kube-forward-darwin-arm64
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: kube-forward.exe
            asset_name: kube-forward-windows-amd64.exe
            cross: false
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Prepare binary
        shell: bash
        run: cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "${{ matrix.asset_name }}"

      - name: Upload release asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          ASSET_NAME: ${{ matrix.asset_name }}
        run: gh release upload "$TAG_NAME" "$ASSET_NAME" --clobber
