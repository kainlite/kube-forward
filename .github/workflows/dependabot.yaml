name: Automerge
on: pull_request

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  tests:
    uses: ./.github/workflows/tests.yaml
  dependabot:
    needs: [tests]
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Approve a PR
        run: gh pr review --approve "$PR_URL"
        env:
         PR_URL: ${{github.event.pull_request.html_url}}
         GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Merge Dependabot PRs
        # Prefer native auto-merge (waits on required checks); fall back to a direct
        # squash merge when auto-merge cannot be enabled (e.g. the branch defines no
        # required status checks). This job already gates on `needs: [tests]`.
        run: gh pr merge --auto --squash "$PR_URL" || gh pr merge --squash "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
