version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    commit-message:
      # chore: CI action bumps do not change the released binary, so no release.
      prefix: "chore"
      include: "scope"
    schedule:
      interval: "monthly"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "rust"
        update-types: ["version-update:semver-major"]
    commit-message:
      # chore: base-image bumps do not change the released binary, so no release.
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      # fix(deps): production dependency bumps change the shipped binary, so they
      # cut a patch release via release-please. Dev/build deps stay chore (no release).
      prefix: "fix"
      prefix-development: "chore"
      include: "scope"
    groups:
      kube:
        patterns:
          - kube
          - k8s-openapi
      core:
        patterns:
          - serde
          - serde_*
          - serde-*
          - anyhow
          - thiserror
          - log
          - tracing
          - tracing*
          - syn
          - quote
          - heck
          - tokio
          - typed-builder
          - schemars
      rest:
        patterns:
          - .*

